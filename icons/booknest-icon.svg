<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
<title id="title">BookNest app icon</title>
<desc id="desc">A white book resting in a golden nest with two green leaves on a deep blue rounded square.</desc>
<defs>
  <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#2d6eb2"/>
    <stop offset="1" stop-color="#164f8d"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#08355f" flood-opacity=".28"/>
  </filter>
</defs>
<rect width="512" height="512" rx="112" fill="url(#bg)"/>
<!-- book -->
<g filter="url(#shadow)">
  <path d="M171 91h181c24 0 43 19 43 43v204c0 22-18 40-40 40H179c-34 0-62 27-62 61V148c0-31 24-57 54-57Z" fill="#fff"/>
  <path d="M171 91h22v274h-18c-22 0-42 8-58 21V148c0-31 24-57 54-57Z" fill="#edf5fb"/>
  <rect x="156" y="111" width="10" height="224" rx="5" fill="#1e5aa8"/>
  <path d="M175 378h180" fill="none" stroke="#dbe7f1" stroke-width="12" stroke-linecap="round"/>
</g>
<!-- nest, reduced to strong broad strokes -->
<g fill="none" stroke="#d2a45c" stroke-width="13" stroke-linecap="round">
  <path d="M78 354c71 58 145 77 226 62 48-9 89-29 130-63"/>
  <path d="M92 383c61 43 129 61 204 52 54-7 101-25 139-55"/>
  <path d="M111 414c52 25 111 36 177 30 59-6 108-22 145-45"/>
  <path d="M106 337c38 41 84 67 138 77"/>
  <path d="M416 335c-38 41-82 66-132 77"/>
</g>
<!-- leaves -->
<g fill="#58ad70">
  <path d="M405 276c-2-33 13-58 42-72 4 31-10 56-42 72Z"/>
  <path d="M389 315c-1-27 11-47 35-58 3 26-9 46-35 58Z"/>
</g>
<path d="M393 328c9-52 28-91 57-119" fill="none" stroke="#58ad70" stroke-width="9" stroke-linecap="round"/>
</svg>